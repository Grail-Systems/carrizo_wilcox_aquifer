<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carrizo-Wilcox 3D Tracker</title>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        /* Left Panel: The Map Legend */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(15, 15, 15, 0.9); border: 1px solid #333;
            color: white; padding: 20px; border-radius: 8px; width: 300px;
        }
        
        /* Right Panel: The Live Threat Feed */
        #threat-feed-panel {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(15, 15, 15, 0.95); border: 1px solid #ff3232;
            color: white; padding: 20px; border-radius: 8px; width: 350px;
            max-height: 80vh; overflow-y: auto; box-shadow: 0 0 15px rgba(255, 50, 50, 0.2);
        }
        
        h1 { font-size: 1.2rem; color: #4CAF50; margin-top: 0; }
        h2 { font-size: 1.1rem; color: #ff3232; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;}
        .legend-item { display: flex; align-items: center; margin-top: 10px; font-size: 0.9rem; }
        .color-box { width: 15px; height: 15px; margin-right: 10px; }
        .deck-tooltip {
            font-family: monospace; font-size: 0.85rem !important; background: rgba(0, 0, 0, 0.9) !important;
            border: 1px solid #ff3232 !important; border-radius: 4px !important; color: #fff !important;
            padding: 10px !important; pointer-events: none;
            max-width: 300px;
        }
        .highlight { color: #ffaa00; }
        .feed-item { border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div id="ui-panel">
        <h1>Aquifer Defense Grid</h1>
        <p style="font-size: 0.9rem; color: #ccc;">Live 3D view of the Carrizo-Wilcox water table and active threats.</p>
        <div class="legend-item"><div class="color-box" style="background: rgba(0, 150, 255, 0.3);"></div> Carrizo-Wilcox Boundary</div>
        <div class="legend-item"><div class="color-box" style="background: rgba(255, 50, 50, 0.9); border-radius: 50%;"></div> High-Volume Draw</div>
        <div class="legend-item"><div class="color-box" style="background: rgba(255, 0, 0, 1);"></div> 3D Active Permit Request</div>
        <div class="legend-item"><div class="color-box" style="background: rgba(57, 255, 20, 0.4); border: 2px solid #39FF14; border-radius: 50%;"></div> Toxic Spill / Discharge Area</div>
        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">Hold SHIFT + Click & Drag to tilt.<br>Hover over any marker to identify.</p>
    </div>
    
    <div id="threat-feed-panel">
        <h2>Live Intercepts</h2>
        <div id="feed-content">
            <p style="font-size: 0.8rem; color: #888;">Intercepting live feed...</p>
        </div>
    </div>
    
    <div id="map"></div>

    <script>
        const { DeckGL, GeoJsonLayer, ColumnLayer, ScatterplotLayer } = deck;

        // Initialize the Map
        const deckgl = new DeckGL({
            container: 'map',
            initialViewState: { longitude: -94.730, latitude: 31.338, zoom: 6.5, pitch: 45, bearing: 10 },
            controller: true,
            mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            getTooltip: ({object}) => {
                if (!object) return null;
                // Existing Wells
                if (object.properties && object.properties.OwnerName) {
                    return { html: `<strong style="color: #ff3232;">EXISTING WELL</strong><br/>-------------------------<br/><span class="highlight">Owner:</span> ${object.properties.OwnerName || 'REDACTED'}<br/><span class="highlight">Usage:</span> ${object.properties.PrimaryWat || 'UNKNOWN'}<br/><span class="highlight">Depth:</span> ${object.properties.WellDepth ? object.properties.WellDepth + ' ft' : 'UNKNOWN'}` };
                }
                // 3D Water Permits
                if (object.bottom_line && object.volume_requested) {
                    return { html: `<strong style="color: #ff3232;">ACTIVE PERMIT THREAT</strong><br/>-------------------------<br/>${object.bottom_line}` };
                }
                // Toxin Spills
                if (object.chemical) {
                    return { html: `<strong style="color: #39FF14;">TOXIC DISCHARGE DETECTED</strong><br/>-------------------------<br/>${object.bottom_line}` };
                }
            },
            layers: [
                new GeoJsonLayer({
                    id: 'aquifer-layer', data: 'wilcox_aquifer.json', filled: true, extruded: false, getFillColor: [0, 150, 255, 60], pickable: false
                }),
                new GeoJsonLayer({
                    id: 'threat-wells-layer', data: 'threat_wells.json', pointType: 'circle', getFillColor: [255, 50, 50, 255], getPointRadius: 1500, pickable: true, autoHighlight: true, highlightColor: [255, 255, 0, 255]
                })
            ]
        });

        // Fetch Both Feeds: Permits and Toxins
        Promise.all([
            fetch('threat_feed.json').then(res => res.json()).catch(() => []),
            fetch('toxin_feed.json').then(res => res.json()).catch(() => [])
        ]).then(([permitData, toxinData]) => {
            
            // Calculate total threat volume
            const totalThreats = permitData.length + toxinData.length;
            let html = `
                <div style="background: #ff3232; color: white; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; border-radius: 4px; box-shadow: 0 0 10px rgba(255, 50, 50, 0.5);">
                    SYSTEM ALERT: ${totalThreats.toLocaleString()} ACTIVE THREATS ON GRID
                </div>
            `;

            // 1. Process Water Permits into UI (Capped at 25 for memory)
            permitData.slice(0, 25).forEach(item => {
                let color = item.status === 'HIGH THREAT' ? '#ff3232' : '#4CAF50';
                
                // The automated email generator button
                let actionBtn = '';
                if (item.status === 'HIGH THREAT') {
                    let emailSubject = `URGENT: Public Opposition to Water Permit - ${item.applicant}`;
                    let emailBody = `To whom it may concern,%0D%0A%0D%0AAs a resident, I am writing to formally oppose the active permit request by ${item.applicant} to draw high-volume water from our local aquifer.%0D%0A%0D%0AThis poses a direct threat to our community's water security. I expect my representatives to intervene immediately.%0D%0A%0D%0ASincerely,%0D%0A[Your Name]`;
                    actionBtn = `<a href="mailto:?subject=${emailSubject}&body=${emailBody}" style="display: inline-block; margin-top: 8px; padding: 6px 12px; background: #ff3232; color: white; text-decoration: none; font-size: 0.8rem; font-weight: bold; border-radius: 4px; text-transform: uppercase;">Take Action: Send Email</a>`;
                }

                html += `
                    <div class="feed-item">
                        <strong style="color: ${color}; font-size: 0.85rem;">[WATER THREAT]</strong><br/>
                        <strong style="color: white; font-size: 0.9rem;">${item.title}</strong><br/>
                        <p style="font-size: 0.85rem; line-height: 1.4; color: #ddd; margin: 5px 0;">${item.bottom_line}</p>
                        ${actionBtn}
                    </div>
                `;
            });

            // 2. Process Toxins into UI (Capped at top 50 for memory)
            toxinData.slice(0, 50).forEach(item => {
                let emailSubject = `URGENT: Toxic Discharge Inquiry - ${item.facility}`;
                let emailBody = `To whom it may concern,%0D%0A%0D%0AAs a resident, I am demanding immediate transparency and state intervention regarding the recent toxic discharge reported at ${item.facility}.%0D%0A%0D%0AWe require an immediate public status update on the containment and groundwater impact.%0D%0A%0D%0ASincerely,%0D%0A[Your Name]`;
                
                html += `
                    <div class="feed-item">
                        <strong style="color: #39FF14; font-size: 0.85rem;">[${item.status}]</strong><br/>
                        <strong style="color: white; font-size: 0.9rem;">${item.facility}</strong><br/>
                        <p style="font-size: 0.85rem; line-height: 1.4; color: #ddd; margin: 5px 0;">${item.bottom_line}</p>
                        <a href="mailto:?subject=${emailSubject}&body=${emailBody}" style="display: inline-block; margin-top: 8px; padding: 6px 12px; background: transparent; border: 2px solid #39FF14; color: #39FF14; text-decoration: none; font-size: 0.8rem; font-weight: bold; border-radius: 4px; text-transform: uppercase;">Demand Investigation</a>
                    </div>
                `;
            });
            
            html += `<p style="text-align: center; color: #888; font-size: 0.75rem; margin-top: 15px;">Feed truncated to top 75 intercepts to preserve system memory. All ${totalThreats.toLocaleString()} threats are actively rendered on the 3D grid.</p>`;

            document.getElementById('feed-content').innerHTML = html || '<p style="color: #4CAF50;">Grid Clear.</p>';

            // 3. Build the 3D Red Permit Spikes
            const highThreats = permitData.filter(t => t.status === "HIGH THREAT");
            const mappedThreats = highThreats.map((threat) => ({
                ...threat, 
                position: threat.coordinates // <--- THE FIX: Using actual GPS coordinates
            }));

            const threatSpikeLayer = new ColumnLayer({
                id: 'threat-spikes',
                data: mappedThreats,
                diskResolution: 12,
                radius: 3000,
                extruded: true,
                pickable: true,
                elevationScale: 50,
                getPosition: d => d.position,
                getFillColor: [255, 0, 0, 255],
                getElevation: d => d.raw_volume || 1000
            });

            // 4. Build the Neon Green Toxin Zones
            const toxinLayer = new ScatterplotLayer({
                id: 'toxin-zones',
                data: toxinData,
                pickable: true,
                opacity: 0.5,
                stroked: true,
                filled: true,
                lineWidthMinPixels: 2,
                getPosition: d => d.coordinates,
                getFillColor: [57, 255, 20, 100], // Transparent Neon Green
                getLineColor: [57, 255, 20, 255], // Solid Neon Green outline
                getRadius: d => d.impact_radius || 3000
            });

            // Inject both new dynamic layers on top of the original base layers
            deckgl.setProps({
                layers: [...deckgl.props.layers, threatSpikeLayer, toxinLayer]
            });
        });
    </script>
</body>
</html>
